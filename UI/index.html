                        <div class="navbar-collapse collapse">
                            <ul class="nav navbar-nav visible-lg visible-md limit-chars">

                        </div>
                    </div>
                </div>
            </div>

            <div class="right content-page">
                <div class="body content rows scroll-y">
                    <form class="form-horizontal" action="">
                        <div class="box-info full" id="taskFormContainer">
                            <h2>Grocery Store Management System</h2>
                            <div class="panel-body pt-0">
                                <div class="row mb-4">
                                    <div class="col-sm-12">
                                        <div class="box-info full p-5">
                                            <h4>Search Orders</h4>
                                            <div class="row">
                                                <div class="col-sm-3">
                                                    <div class="form-group">
                                                        <label>Customer Name</label>
                                                        <input type="text" id="searchCustomerName" class="form-control" placeholder="Enter customer name">
                                                    </div>
                                                </div>
                                                <div class="col-sm-3">
                                                    <div class="form-group">
                                                        <label>Order ID</label>
                                                        <input type="number" id="searchOrderId" class="form-control" placeholder="Enter order ID">
                                                    </div>
                                                </div>
                                                <div class="col-sm-3">
                                                    <div class="form-group">
                                                        <label>Start Date</label>
                                                        <input type="date" id="searchStartDate" class="form-control">
                                                    </div>
                                                </div>
                                                <div class="col-sm-3">
                                                    <div class="form-group">
                                                        <label>End Date</label>
                                                        <input type="date" id="searchEndDate" class="form-control">
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="row">
                                                <div class="col-sm-12">
                                                    <button type="button" id="searchBtn" class="btn btn-sm btn-info">Search</button>
                                                    <button type="button" id="resetBtn" class="btn btn-sm btn-secondary">Reset</button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                    <table class="table table-bordered" style="text-align: center" id="ordersTable">
                                    <thead >
                                        <tr>
                                            <th style="text-align: center">Date</th>
                                            <th style="text-align: center">Order Number</th>
                                            <th style="text-align: center">Customer Name</th>
                                            <th style="text-align: center">Total Cost</th>
                                            <th style="text-align: center">Action</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr>
                                            <td colspan="5" class="text-center">Loading orders...</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </form>
                    <div class="modal " id="userProfileModal" role="dialog" >
                        <div class="modal-dialog">
                            <div class="modal-content">
                                <div class="modal-body text-center">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="modal fade-scale" id="myModal" role="dialog" data-backdrop="static">
                <div class="modal-dialog modal-lg">
                    <div class="modal-content">
                        <div class="modal-body text-center">

                        </div>
